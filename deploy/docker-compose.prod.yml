services:
  caddy:
    image: caddy:2.8-alpine
    container_name: willumplabs-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    command:
      - caddy
      - reverse-proxy
      - --from
      - ${DOMAIN}
      - --to
      - app:8080

  app:
    image: ${IMAGE}
    container_name: willumplabs
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      PORT: "8080"

volumes:
  caddy_data:
  caddy_config:
